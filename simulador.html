<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>
    <div class="container">
        <h1>Simulador de Crédito</h1>

        <h2>Datos Financieros</h2>
<label for="txtIngresos">Ingresos Mensuales:</label>
<input type="number" id="txtIngresos" placeholder="0.00">

<label for="txtArriendo">Gasto de Arriendo:</label>
<input type="number" id="txtArriendo" placeholder="0.00">

<label for="txtAlimentacion">Gasto de Alimentación:</label>
<input type="number" id="txtAlimentacion" placeholder="0.00">

<label for="txtVarios">Gastos Varios:</label>
<input type="number" id="txtVarios" placeholder="0.00">

<div class="info-previa">
    <p>Total Egresos: <span id="spnTotalEgresos">$0.00</span></p>
    <p>Disponible: <span id="spnDisponible">$0.00</span></p>
    <p>Capacidad de pago: <span id="spnCapacidadPago">$0.00</span></p>
</div>

        <hr>

        <h2>Solicitud de Crédito</h2>
        <label>Monto:</label>
        <input type="number" id="txtMonto" value="0">
        <label>Plazo (Años):</label>
        <input type="number" id="txtPlazo" value="0">
        <label>Tasa (%):</label>
        <input type="number" id="txtTasaInteres" value="0">

        <p>Interés a pagar: <span id="spnInteresPagar">$0.00</span></p>
        <p>Total préstamo: <span id="lblTotalValor">$0.00</span></p>
        <p>Cuota mensual: <span id="lblCuotaValor">$0.00</span></p>
        <p>Estado: <span id="lblMensaje">ESPERANDO...</span></p>

        <div class="buttons">
            <button onclick="calcular()">Calcular Crédito</button>
            <button onclick="location.reload()">Reiniciar</button>
        </div>
    </div>

    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</body>
</html>
